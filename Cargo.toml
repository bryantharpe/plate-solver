[workspace]
resolver = "2"
members = ["ps-core", "ps-detect", "ps-db", "ps-dbgen", "ps-solve", "ps-grpc", "ps-web"]
exclude = ["tools/parity/_capture_binning", "reference-solutions/cedar-detect"]

[workspace.dependencies]
# Math
nalgebra = "0.32"
rayon = "1.10"

# KD-tree
kiddo = "5.0"

# Memory mapping
memmap2 = "0.9"

# Image processing (pinned to cedar-detect compat versions)
# default-features disabled to avoid edition2024 transitive deps on Rust 1.83
image = { version = "=0.25.1", default-features = false, features = ["jpeg"] }
imageproc = { version = "=0.25.0", default-features = false }

# Numeric types
half = "2.4"
byteorder = "1.5"

# CLI
clap = { version = "4.5", features = ["derive"] }

# gRPC (tonic 0.11 / prost 0.12 — pinned to match cedar-detect for interop)
tonic = "0.11"
prost = "0.12"
tonic-web = "0.11"
prost-types = "0.12"

# HTTP (web API)
axum = { version = "0.7", features = ["multipart"] }
rust-embed = { version = "8", features = ["debug-embed"] }
mime_guess = "2"

# Build deps
tonic-build = "0.11"

# Serialization (test fixtures / parity)
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Archive
zip = { version = "2", default-features = false, features = ["deflate"] }

# Test helpers
tempfile = "3.14"

[workspace]
resolver = "2"
members = ["ps-core"]

[workspace.dependencies]
# Math
nalgebra = "0.32"

# KD-tree
kiddo = "5.0"

# Memory mapping
memmap2 = "0.9"

# Image processing
image = "0.25"

# Numeric types
half = "2.4"
byteorder = "1.5"

# CLI
clap = { version = "4.5", features = ["derive"] }

# gRPC (tonic 0.11 / prost 0.12 — pinned to match cedar-detect for interop)
tonic = "0.11"
prost = "0.12"
tonic-web = "0.5"
prost-types = "0.12"

# Build deps
tonic-build = "0.11"
# Record what a gate PROVED — not merely that it passed.
#
# A green tick is a summary, not evidence. It does not say what was asserted, and it does not
# carry what was measured. `test-coverage` computed the workspace's line coverage, compared it
# to an 80% floor, wrote lcov to a file and threw the number away: the strongest claim that
# gate can make about run 7, forever, is "≥80%". `provenance` compared the diff against every
# known prior implementation and found none identical — but never said how many it compared
# against, so a real check and a check that compared against nothing look the same from here.
#
# That is what forces an audit to reconstruct gate intent from the outside, and reconstruction
# is guesswork. So each gate states its own case, once, in the job that actually knows:
#
#   proves    — the claim, in words. What is true if this gate is green?
#   measured  — the number it found. The thing that would otherwise be discarded.
#
# The VERDICT is deliberately absent: GitHub already records pass/fail on the check-run, and a
# gate that reports its own verdict is a gate marking its own homework. This says what the gate
# CHECKED. GitHub says whether it passed. The audit record joins them.
#
# NEVER FAILS THE GATE. Every caller sets continue-on-error; a bad attestation must not turn a
# required check red. Attestation is evidence, not enforcement.
name: attest
description: Record what this gate proved and what it measured, as evidence for the bead audit record.

inputs:
  gate:
    description: Gate name. MUST match the job's `name:` — that is the key the audit record joins on.
    required: true
  proves:
    description: What is true if this gate is green. Write it as a claim, not as a command.
    required: true
  measured:
    description: The figure the gate found (coverage %, priors compared, count of findings). Empty if genuinely nothing to measure.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Write attestation
      shell: bash
      run: |
        set -uo pipefail
        mkdir -p .attest
        jq -n \
          --arg gate        "${{ inputs.gate }}" \
          --arg proves      "${{ inputs.proves }}" \
          --arg measured    "${{ inputs.measured }}" \
          --arg sha         "${{ github.event.pull_request.head.sha || github.sha }}" \
          --arg run_id      "${{ github.run_id }}" \
          --arg run_attempt "${{ github.run_attempt }}" \
          '{gate:$gate, proves:$proves, measured:$measured,
            sha:$sha, run_id:$run_id, run_attempt:($run_attempt|tonumber)}' \
          > ".attest/${{ inputs.gate }}.json"
        cat ".attest/${{ inputs.gate }}.json"

    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: attestation-${{ inputs.gate }}
        path: .attest/${{ inputs.gate }}.json
        retention-days: 90
        if-no-files-found: error

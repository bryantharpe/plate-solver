# Tier-2 verification — FAST gates for plate-solver.
#
# Derived from bryantharpe/agent-standards rust/ci/ci.yml (to be subtree-imported
# as standards/ once standards-sync exists; this is the direct install).
#
# GATED ON BUILDABLE CODE: main starts spec-only (the specs-only rewrite). The `detect` job
# checks for a root Cargo.toml; every cargo job skips cleanly until the first
# crate lands (GitHub treats skipped required checks as satisfied), so branch
# protection can require all jobs TODAY and the gates arm themselves the moment
# code exists. The secret scan always runs — specs can leak secrets too.
#
# Supply-chain hardening: actions pinned by commit SHA, least-privilege token,
# pinned tool versions, --locked everywhere.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pinned tool versions — proven against the agent-standards canary.
  CARGO_LLVM_COV_VERSION: "0.8.7"
  CARGO_MACHETE_VERSION: "0.9.2"
  RIPSECRETS_VERSION: "0.1.11"

jobs:
  detect:
    name: detect
    runs-on: ubuntu-latest
    outputs:
      has_code: ${{ steps.check.outputs.has_code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_code=true" >> "$GITHUB_OUTPUT"
            echo "Cargo workspace detected — cargo gates ACTIVE"
          else
            echo "has_code=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No root Cargo.toml yet (spec-only branch) — cargo gates skip until the first crate lands"
          fi

  fmt:
    name: rustfmt
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test-coverage:
    name: test-coverage
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: llvm-tools-preview }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-llvm-cov --version "$CARGO_LLVM_COV_VERSION" --locked
      - name: Tests + coverage gate (90% floor on ps-core per rig overlay; 80% workspace)
        run: cargo llvm-cov --workspace --locked --all-features --fail-under-lines 80 --lcov --output-path lcov.info
      - name: Doctests (coverage tool excludes them)
        run: cargo test --workspace --locked --doc

  docs:
    name: docs
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --all-features

  msrv:
    name: msrv
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Keep in sync with rust-version in Cargo.toml (single source of truth).
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { toolchain: "1.96.0" }
      - run: cargo build --workspace --locked

  unused-deps:
    name: cargo-machete
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo install cargo-machete --version "$CARGO_MACHETE_VERSION" --locked
      - run: cargo machete

  deny:
    name: cargo-deny
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories bans sources licenses

  # cargo-semver-checks intentionally ABSENT until the first tagged release
  # exists as a baseline — an unfailable job would be a fake gate.

  secrets:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo install ripsecrets --version "$RIPSECRETS_VERSION" --locked
      - run: ripsecrets .

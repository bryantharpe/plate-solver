# Tier-2 verification — FAST gates for plate-solver.
#
# Derived from bryantharpe/agent-standards rust/ci/ci.yml (to be subtree-imported
# as standards/ once standards-sync exists; this is the direct install).
#
# GATED ON BUILDABLE CODE: main starts spec-only (the specs-only rewrite). The `detect` job
# checks for a root Cargo.toml; every cargo job skips cleanly until the first
# crate lands (GitHub treats skipped required checks as satisfied), so branch
# protection can require all jobs TODAY and the gates arm themselves the moment
# code exists. The secret scan always runs — specs can leak secrets too.
#
# Supply-chain hardening: actions pinned by commit SHA, least-privilege token,
# pinned tool versions, --locked everywhere.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    # `labeled`/`unlabeled` are NOT in the default set ([opened, synchronize,
    # reopened]), and the `hold` job is useless without them: applying
    # `hold:human` would not re-run CI, so the required check would sit GREEN and
    # the brake would not brake.
    #
    # Found the hard way on the first real hold (PR #27) — the label went on and
    # nothing turned red. The thing described as "the only mechanism an autonomous
    # participant cannot override" was, until this line, decoration.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pinned tool versions — proven against the agent-standards canary.
  CARGO_LLVM_COV_VERSION: "0.8.7"
  CARGO_MACHETE_VERSION: "0.9.2"
  RIPSECRETS_VERSION: "0.1.11"

jobs:
  detect:
    name: detect
    runs-on: ubuntu-latest
    outputs:
      has_code: ${{ steps.check.outputs.has_code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_code=true" >> "$GITHUB_OUTPUT"
            echo "Cargo workspace detected — cargo gates ACTIVE"
          else
            echo "has_code=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No root Cargo.toml yet (spec-only branch) — cargo gates skip until the first crate lands"
          fi
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: detect
          proves: "whether a root Cargo.toml exists, which is what arms every cargo gate below"
          measured: "has_code=${{ steps.check.outputs.has_code }}"

  fmt:
    name: rustfmt
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: rustfmt
          proves: "every file in the workspace is byte-identical to its rustfmt output"
          measured: "0 files deviate"

  clippy:
    name: clippy
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: clippy
          proves: "clippy raises zero lints across the whole workspace, all targets and all features, with warnings denied"
          measured: "0 lints"

  test-coverage:
    name: test-coverage
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: llvm-tools-preview }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-llvm-cov --version "$CARGO_LLVM_COV_VERSION" --locked
      - name: Tests + coverage gate (90% floor on ps-core per rig overlay; 80% workspace)
        id: cov
        run: |
          set -uo pipefail
          cargo llvm-cov --workspace --locked --all-features \
            --fail-under-lines 80 --lcov --output-path lcov.info || exit 1
          # KEEP THE NUMBER. The gate asserts >=80 and, with --lcov, prints nothing a human or
          # an audit can read — so "passed" was the only surviving fact and 80.1% was
          # indistinguishable from 100%. `report` re-renders the profdata the run just produced;
          # it re-runs no tests. Never let it fail the gate: the coverage FLOOR is the gate, this
          # is only the evidence.
          pct="$(cargo llvm-cov report --summary-only --json 2>/dev/null \
                 | jq -r '.data[0].totals.lines.percent // empty' 2>/dev/null || true)"
          [ -n "$pct" ] && pct="$(printf '%.2f' "$pct")"
          echo "pct=${pct:-unknown}" >> "$GITHUB_OUTPUT"
          echo "line coverage: ${pct:-unknown}% (floor 80%)"
      - name: Doctests (coverage tool excludes them)
        run: cargo test --workspace --locked --doc
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: test-coverage
          proves: "workspace line coverage is at or above the 80% floor; all tests and doctests pass under --locked"
          measured: "${{ steps.cov.outputs.pct }}% lines (floor 80%)"

  docs:
    name: docs
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --all-features
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: docs
          proves: "rustdoc builds the whole workspace with zero warnings (broken intra-doc links included)"
          measured: "0 rustdoc warnings"

  msrv:
    name: msrv
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Keep in sync with rust-version in Cargo.toml (single source of truth).
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { toolchain: "1.96.0" }
      - run: cargo build --workspace --locked
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: msrv
          proves: "the workspace still builds on the oldest Rust we claim to support, so no dependency or syntax has silently raised the floor"
          measured: "builds on 1.96.0 (the declared MSRV)"

  unused-deps:
    name: cargo-machete
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo install cargo-machete --version "$CARGO_MACHETE_VERSION" --locked
      - run: cargo machete
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: cargo-machete
          proves: "every dependency declared in a Cargo.toml is actually used by the crate that declares it"
          measured: "0 unused dependencies (cargo-machete ${{ env.CARGO_MACHETE_VERSION }})"

  deny:
    name: cargo-deny
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories bans sources licenses
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: cargo-deny
          proves: "no dependency carries a known security advisory, a banned crate, an unvetted source registry, or a disallowed licence"
          measured: "0 findings across advisories, bans, sources, licenses"

  # cargo-semver-checks intentionally ABSENT until the first tagged release
  # exists as a baseline — an unfailable job would be a fake gate.

  secrets:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo install ripsecrets --version "$RIPSECRETS_VERSION" --locked
      - run: ripsecrets .
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: secret-scan
          proves: "no committed file in the full history contains anything ripsecrets recognises as a credential"
          measured: "0 secrets (ripsecrets ${{ env.RIPSECRETS_VERSION }}, full history, fetch-depth 0)"

  # hq-judge-01. Every other gate here asks "is this code GOOD?". None of them
  # asks "did this agent WRITE it?" — and on 2026-07-12 that gap let a
  # byte-identical restore of earlier work pass all nine checks AND an APPROVE
  # from the judge. For a rewrite whose purpose is to measure whether a model can
  # build from specs, a copied answer voids the experiment while showing 10/10
  # green, which is worse than a failure because it looks like a success.
  #
  # fetch-depth: 0 is mandatory — the priors live in history.
  #
  # NOT gated on detect.has_code: that output tests whether a root Cargo.toml
  # EXISTS, which has been permanently true since the first crate landed. It
  # never distinguished a spec-only DIFF. The script gates on the diff itself and
  # reports SUCCESS for spec-only PRs, which is also why this is a normal job and
  # not a path-filtered workflow — a required check that never reports leaves the
  # PR hanging on "Expected — waiting for status" forever.
  provenance:
    name: provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - run: git fetch -q origin main
      - id: priors
        env:
          PROVENANCE_PRIORS: ${{ vars.PROVENANCE_PRIORS }}
        # HOW MANY PRIORS DID IT ACTUALLY COMPARE AGAINST? Green meant "no prior matches", which
        # is exactly what an EMPTY prior list also produces. A gate whose pass and whose no-op
        # are indistinguishable is not yet evidence. Count them — the count only, never the SHAs
        # (the list is an Actions variable and not a file precisely because a polecat once ran
        # `cat .github/provenance-priors.txt` and went hunting the SHA it found).
        run: |
          set -uo pipefail
          n="$(printf '%s\n' $PROVENANCE_PRIORS | grep -c '[0-9a-f]' || true)"
          echo "n=${n:-0}" >> "$GITHUB_OUTPUT"
          echo "comparing against ${n:-0} known prior implementation(s)"
      - run: bash scripts/ci/verify-fresh-authoring.sh
        env:
          BASE_REF: origin/main
          # The prior SHAs are an Actions variable, NOT a file in the repo. They used
          # to live in .github/provenance-priors.txt — until a polecat on a from-specs
          # bead ran `cat .github/provenance-priors.txt`, then spent six commands
          # hunting the SHA it found there. The gate built to catch recovery was
          # handing out the map. Edit with: gh variable set PROVENANCE_PRIORS
          PROVENANCE_PRIORS: ${{ vars.PROVENANCE_PRIORS }}
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: provenance
          proves: "no file in this diff is byte-identical to the same file in any known prior implementation"
          measured: "0 byte-identical files, compared against ${{ steps.priors.outputs.n }} prior implementation(s)"

  # hq-hold-01. On 2026-07-12 a human converted a PR to DRAFT to stop it while its
  # contents were in question; an agent marked it ready_for_review 2m26s later and
  # it merged 7 seconds after that. Nothing in our scripts, our formulas, or the gt
  # binary calls `gh pr ready` — an agent simply decided to, being helpful.
  #
  # So the brake cannot be an honour-system label that agents are asked to respect,
  # nor draft status, which they can clear. It has to be a REQUIRED CHECK that is
  # RED while the hold is on: GitHub refuses the merge, and no amount of agent
  # helpfulness can argue with that. This is the only mechanism in the pipeline
  # that an autonomous participant cannot override.
  #
  # THIS JOB IS UNIVERSAL AND MUST STAY THAT WAY. DO NOT make it conditional on the
  # rig's `hold.enabled` flag. The flag (config/rig-flags.json, town-side) governs only
  # whether authoring-integrity-guard may APPLY the label automatically. The job is inert
  # without the label — green by construction on a rig where nothing applies it — so
  # leaving it universal costs nothing, keeps branch protection identical across rigs, and
  # preserves the thing the label is actually for: an operator can park ANY PR, on ANY rig,
  # by hand, and every tool in the pipeline will respect it.
  hold:
    name: hold
    runs-on: ubuntu-latest
    steps:
      # Checkout is here only so the attest action below can be resolved from the repo.
      # The hold assertion itself reads the label from the event payload and needs no code.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Fail while an operator has parked this PR
        if: contains(github.event.pull_request.labels.*.name, 'hold:human')
        run: |
          echo "::error::hold:human — an operator has parked this PR. Merging is blocked."
          echo
          echo "If you are an agent: do NOT remove the label, and do NOT mark this PR ready"
          echo "for review. Leave it parked and say so."
          echo
          # This used to say 'Remove the label to release it', which was FALSE and was the
          # last thing an operator read before acting. Removing the label does two things,
          # both wrong: authoring-integrity-guard re-applies it within 2 minutes (a finding
          # is cleared by ADDING integrity:cleared, never by removing a label), and it does
          # not bring back the merge request that holding the PR destroyed — so `review/judge`,
          # a required check, is never posted and the PR stays unmergeable no matter what you
          # click. Two PRs were closed unmerged from this page because the release path was a
          # lie and the Close button was the only thing that worked (#53/#54, 2026-07-14).
          # ABSOLUTE PATH, ON PURPOSE. This text is read on github.com, in the Actions log of
          # THIS repo — and `scripts/` does not exist in this repo. It lives in the town
          # (gt-town-config, deployed to ~/gt). A bare `scripts/ops/...` sends the operator
          # looking in the wrong checkout, which is the same class of mistake as the line this
          # message replaced.
          echo "OPERATOR — to release this PR, on the town host:"
          echo "    ~/gt/scripts/ops/mq-release.sh plate_solver ${{ github.event.pull_request.number }} --yes"
          echo "It adds integrity:cleared, drops the hold, and RESUBMITS the merge request"
          echo "(without which the judge never runs and this PR can never merge)."
          echo "Removing the label by hand will NOT work. Run it without --yes for a dry run."
          exit 1
      - run: echo "No operator hold. Proceeding."
      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: hold
          proves: "no operator has parked this PR — green here means the hold:human label was ABSENT, not that anyone approved"
          measured: "hold:human absent"

  # ps-ops-03-integrity-gate-race. The authoring-integrity guard runs on a 5-minute
  # cron and only scans OPEN PRs. The refinery pipeline can open and merge a PR in
  # ~2 minutes, so the transcript grade is never produced before merge. A cron job
  # that an agent can outrun is not a gate; only a REQUIRED CHECK that is RED while
  # the stamp is absent can block merge before GitHub allows it.
  #
  # This job mirrors the hold job above: it runs on every PR event that can change
  # labels, and it FAILS CLOSED. A from-specs PR with no positive integrity grade is
  # UNGRADED, not clean. The stamp can be either:
  #   * an `integrity:graded` label applied by the town-side guard after it scans the
  #     polecat transcript and finds RED=0, or
  #   * an `integrity:cleared` label applied by a human operator who has adjudicated
  #     a finding (the guard's existing release hatch).
  #
  # Non-from-specs PRs (no polecat branch, no from-specs bead) are not subject to
  # this gate and pass immediately. The check must still REPORT on every PR so branch
  # protection sees a status; a filtered-away job would leave the PR hanging on
  # "Expected — waiting for status".
  integrity:
    name: integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - name: Verify positive integrity stamp
        id: stamp
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_REPO: ${{ github.repository }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -uo pipefail

          # THIS GATE GRADES A PULL REQUEST. On any other event there is no pull request
          # in the payload to grade, and it must say so instead of failing.
          #
          # `on:` includes `push: branches: [main]`, and this job had no event guard. A push
          # payload has no `pull_request` object, so PR_NUMBER/PR_BRANCH/PR_SHA arrived empty
          # and PR_LABELS_JSON arrived as `[]` — no stamp, so the fail-closed path below fired
          # and the run went red. Not on a finding: on the absence of a PR that was never
          # going to be there. Every merge to main produced one guaranteed-red run (24 of them
          # before this line existed, against 16 green), and each one mailed the operator.
          #
          # The cost was never the mail. A main that is red by construction cannot report a
          # main that is red for cause, so the one signal this repo would most want to hear
          # was buried under its own noise floor.
          #
          # THIS IS NOT THE BRANCH SCOPING FORBIDDEN BELOW, and the difference is the whole
          # point. That escape hatch was `case "$branch" in polecat/*)` — it read a name the
          # AUTHOR CHOOSES, on a real PR, and waved it through ungraded (PR #34). This reads
          # the EVENT TYPE, which no author controls and which GitHub sets. A PR cannot arrive
          # as a push. Nothing skips a grade it would otherwise have received: by the time a
          # commit reaches main it has already been through this gate as a PR, where the stamp
          # was required and branch protection would not merge without it.
          #
          # Deliberately an in-script exit and not a job-level `if:`. A job-level condition
          # that is wrong in the other direction skips the gate ON PULL REQUESTS — silently,
          # with a green check — which is precisely the ungraded-merge failure this whole job
          # exists to prevent. Here the default path is still "run the gate and fail closed";
          # only an explicit, positive match on a non-PR event exits early. Wrong in the worst
          # case means red on a push again. Loud beats absent.
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "stamp=n/a ($EVENT_NAME is not a pull request)" >> "$GITHUB_OUTPUT"
            echo "Event is '$EVENT_NAME', not 'pull_request' — there is no PR here to grade."
            echo "Commits reach main only through a PR, where this gate ran and a positive"
            echo "stamp was required before branch protection allowed the merge. This is not"
            echo "a second grading opportunity being skipped; it is the same grade, already"
            echo "taken. NOT APPLICABLE."
            exit 0
          fi

          pr="$PR_NUMBER"
          branch="$PR_BRANCH"
          sha="$PR_SHA"
          repo="$PR_REPO"

          # NEVER SCOPE THIS GATE ON THE BRANCH NAME.
          #
          # It used to open with `case "$branch" in polecat/*) ;; *) PASS ;; esac`, and the
          # town-side guard skipped on the same prefix. Which made the entire integrity
          # control plane OPT-IN BY A NAME THE AGENT CHOOSES ITSELF: push to a branch not
          # called polecat/*, and CI waves you through and the guard never reads your
          # transcript.
          #
          # PR #34 — the PR that INTRODUCED this gate — ran from a branch called
          # `ps-ops-03-integrity-gate-race`, logged "Not a polecat branch — integrity gate
          # does not apply. PASS", and merged ungraded. The polecat was not evading; it just
          # named its working branch plainly, and the control evaporated. A gate that any
          # author can step around by choosing a different branch name is decoration.
          #
          # So EVERY PR needs a positive ruling. CI cannot read beads, so it cannot tell a
          # from-specs PR from an ordinary one — and it must not try. The town-side guard
          # can, and it rules on every open PR each sweep:
          #
          #   integrity:graded  — from-specs, transcript scanned, no recovery reconnaissance
          #   integrity:n-a     — not an authoring PR (no bead, or the bead is not from-specs)
          #   integrity:cleared — an OPERATOR has adjudicated a finding (agents: never apply)
          #   hold:human        — a RED hit, or unverifiable. Blocks via the `hold` check.
          #
          # An ordinary PR is therefore red for one guard sweep (~2 min) and then goes green
          # on the `labeled` trigger. That wait is the cost of the gate being real. If you
          # need to move now, apply integrity:cleared — deliberately, and on the record.
          # (ps-ops-05)
          # WHICH stamp let this through is part of the finding, not a detail. `integrity:graded`
          # means a transcript was read and came back clean. `integrity:n-a` means nobody looked,
          # because there was nothing to look at. `integrity:cleared` means a HUMAN overrode a
          # finding. All three are green here and they are not remotely the same claim — so the
          # attestation names the one that actually applied.
          #   integrity:flagged — a finding WAS recorded, on a rig whose operator has
          #                       hold.enabled=false (config/rig-flags.json). Observe-only:
          #                       graded, escalated, permanently labelled — and NOT blocked.
          #                       It is green here because the alternative is worse. Gating
          #                       the hold without adding this stamp would leave a flagged PR
          #                       with NO stamp at all, so this fail-closed check would block
          #                       it anyway, with no label saying why: the brake made invisible
          #                       rather than removed. plate_solver keeps hold.enabled=true, so
          #                       there a finding still gets hold:human and still blocks — a
          #                       self-applied integrity:flagged buys an agent nothing.
          stamp="$(printf '%s' "$PR_LABELS_JSON" \
            | jq -r 'map(select(. == "integrity:graded" or . == "integrity:cleared" or . == "integrity:n-a" or . == "integrity:flagged")) | first // empty' 2>/dev/null || true)"
          if [[ -n "$stamp" ]]; then
            echo "stamp=$stamp" >> "$GITHUB_OUTPUT"
            echo "Positive integrity stamp present: $stamp"
            echo "PASS"
            exit 0
          fi

          # Also accept a posted success status from the town-side guard (future path).
          status_state="$(gh api "repos/$repo/commits/$sha/status" \
            --jq '[.statuses[] | select(.context == "integrity/grade")][0].state // "absent"' 2>/dev/null || echo absent)"
          if [[ "$status_state" == "success" ]]; then
            echo "stamp=integrity/grade status" >> "$GITHUB_OUTPUT"
            echo "integrity/grade status is success."
            echo "PASS"
            exit 0
          fi

          # FAIL CLOSED. No stamp means UNGRADED, and ungraded is not clean.
          echo "::error::PR #$pr ($branch) carries no integrity ruling."
          echo "The town-side guard has not yet ruled on this PR. It sweeps every 2 minutes and"
          echo "will apply one of: integrity:graded (from-specs, clean) · integrity:n-a (not an"
          echo "authoring PR) · hold:human (recovery reconnaissance found, or unverifiable)."
          echo ""
          echo "If this stays red for more than a few minutes the guard is not running — that is"
          echo "the failure this gate is designed to surface, not a reason to bypass it. An"
          echo "operator may apply 'integrity:cleared' to override, deliberately and on the record."
          echo "FAIL"
          exit 1

      - uses: ./.github/actions/attest
        continue-on-error: true
        with:
          gate: integrity

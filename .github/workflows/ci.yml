# Tier-2 verification — FAST gates for plate-solver.
#
# Derived from bryantharpe/agent-standards rust/ci/ci.yml (to be subtree-imported
# as standards/ once standards-sync exists; this is the direct install).
#
# GATED ON BUILDABLE CODE: main starts spec-only (the specs-only rewrite). The `detect` job
# checks for a root Cargo.toml; every cargo job skips cleanly until the first
# crate lands (GitHub treats skipped required checks as satisfied), so branch
# protection can require all jobs TODAY and the gates arm themselves the moment
# code exists. The secret scan always runs — specs can leak secrets too.
#
# Supply-chain hardening: actions pinned by commit SHA, least-privilege token,
# pinned tool versions, --locked everywhere.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    # `labeled`/`unlabeled` are NOT in the default set ([opened, synchronize,
    # reopened]), and the `hold` job is useless without them: applying
    # `hold:human` would not re-run CI, so the required check would sit GREEN and
    # the brake would not brake.
    #
    # Found the hard way on the first real hold (PR #27) — the label went on and
    # nothing turned red. The thing described as "the only mechanism an autonomous
    # participant cannot override" was, until this line, decoration.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pinned tool versions — proven against the agent-standards canary.
  CARGO_LLVM_COV_VERSION: "0.8.7"
  CARGO_MACHETE_VERSION: "0.9.2"
  RIPSECRETS_VERSION: "0.1.11"

jobs:
  detect:
    name: detect
    runs-on: ubuntu-latest
    outputs:
      has_code: ${{ steps.check.outputs.has_code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: check
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_code=true" >> "$GITHUB_OUTPUT"
            echo "Cargo workspace detected — cargo gates ACTIVE"
          else
            echo "has_code=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No root Cargo.toml yet (spec-only branch) — cargo gates skip until the first crate lands"
          fi

  fmt:
    name: rustfmt
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test-coverage:
    name: test-coverage
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { components: llvm-tools-preview }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-llvm-cov --version "$CARGO_LLVM_COV_VERSION" --locked
      - name: Tests + coverage gate (90% floor on ps-core per rig overlay; 80% workspace)
        run: cargo llvm-cov --workspace --locked --all-features --fail-under-lines 80 --lcov --output-path lcov.info
      - name: Doctests (coverage tool excludes them)
        run: cargo test --workspace --locked --doc

  docs:
    name: docs
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --all-features

  msrv:
    name: msrv
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Keep in sync with rust-version in Cargo.toml (single source of truth).
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { toolchain: "1.96.0" }
      - run: cargo build --workspace --locked

  unused-deps:
    name: cargo-machete
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo install cargo-machete --version "$CARGO_MACHETE_VERSION" --locked
      - run: cargo machete

  deny:
    name: cargo-deny
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories bans sources licenses

  # cargo-semver-checks intentionally ABSENT until the first tagged release
  # exists as a baseline — an unfailable job would be a fake gate.

  secrets:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo install ripsecrets --version "$RIPSECRETS_VERSION" --locked
      - run: ripsecrets .

  # hq-judge-01. Every other gate here asks "is this code GOOD?". None of them
  # asks "did this agent WRITE it?" — and on 2026-07-12 that gap let a
  # byte-identical restore of earlier work pass all nine checks AND an APPROVE
  # from the judge. For a rewrite whose purpose is to measure whether a model can
  # build from specs, a copied answer voids the experiment while showing 10/10
  # green, which is worse than a failure because it looks like a success.
  #
  # fetch-depth: 0 is mandatory — the priors live in history.
  #
  # NOT gated on detect.has_code: that output tests whether a root Cargo.toml
  # EXISTS, which has been permanently true since the first crate landed. It
  # never distinguished a spec-only DIFF. The script gates on the diff itself and
  # reports SUCCESS for spec-only PRs, which is also why this is a normal job and
  # not a path-filtered workflow — a required check that never reports leaves the
  # PR hanging on "Expected — waiting for status" forever.
  provenance:
    name: provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - run: git fetch -q origin main
      - run: bash scripts/ci/verify-fresh-authoring.sh
        env:
          BASE_REF: origin/main
          # The prior SHAs are an Actions variable, NOT a file in the repo. They used
          # to live in .github/provenance-priors.txt — until a polecat on a from-specs
          # bead ran `cat .github/provenance-priors.txt`, then spent six commands
          # hunting the SHA it found there. The gate built to catch recovery was
          # handing out the map. Edit with: gh variable set PROVENANCE_PRIORS
          PROVENANCE_PRIORS: ${{ vars.PROVENANCE_PRIORS }}

  # hq-hold-01. On 2026-07-12 a human converted a PR to DRAFT to stop it while its
  # contents were in question; an agent marked it ready_for_review 2m26s later and
  # it merged 7 seconds after that. Nothing in our scripts, our formulas, or the gt
  # binary calls `gh pr ready` — an agent simply decided to, being helpful.
  #
  # So the brake cannot be an honour-system label that agents are asked to respect,
  # nor draft status, which they can clear. It has to be a REQUIRED CHECK that is
  # RED while the hold is on: GitHub refuses the merge, and no amount of agent
  # helpfulness can argue with that. This is the only mechanism in the pipeline
  # that an autonomous participant cannot override.
  hold:
    name: hold
    runs-on: ubuntu-latest
    steps:
      - name: Fail while an operator has parked this PR
        if: contains(github.event.pull_request.labels.*.name, 'hold:human')
        run: |
          echo "::error::hold:human — an operator has parked this PR. Merging is blocked."
          echo "Remove the label to release it. If you are an agent: do NOT remove it,"
          echo "and do NOT mark this PR ready for review. Leave it parked and say so."
          exit 1
      - run: echo "No operator hold. Proceeding."

  # ps-ops-03-integrity-gate-race. The authoring-integrity guard runs on a 5-minute
  # cron and only scans OPEN PRs. The refinery pipeline can open and merge a PR in
  # ~2 minutes, so the transcript grade is never produced before merge. A cron job
  # that an agent can outrun is not a gate; only a REQUIRED CHECK that is RED while
  # the stamp is absent can block merge before GitHub allows it.
  #
  # This job mirrors the hold job above: it runs on every PR event that can change
  # labels, and it FAILS CLOSED. A from-specs PR with no positive integrity grade is
  # UNGRADED, not clean. The stamp can be either:
  #   * an `integrity:graded` label applied by the town-side guard after it scans the
  #     polecat transcript and finds RED=0, or
  #   * an `integrity:cleared` label applied by a human operator who has adjudicated
  #     a finding (the guard's existing release hatch).
  #
  # Non-from-specs PRs (no polecat branch, no from-specs bead) are not subject to
  # this gate and pass immediately. The check must still REPORT on every PR so branch
  # protection sees a status; a filtered-away job would leave the PR hanging on
  # "Expected — waiting for status".
  integrity:
    name: integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - name: Verify positive integrity stamp
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_REPO: ${{ github.repository }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -uo pipefail

          pr="$PR_NUMBER"
          branch="$PR_BRANCH"
          sha="$PR_SHA"
          repo="$PR_REPO"

          # Not every PR is from a polecat on a from-specs bead. Only those are in scope.
          case "$branch" in
            polecat/*) ;;
            *) echo "Not a polecat branch ($branch) — integrity gate does not apply."
               echo "PASS"
               exit 0 ;;
          esac

          # A positive stamp is one of the two labels the town-side guard / operator use.
          if printf '%s' "$PR_LABELS_JSON" | jq -e 'map(select(. == "integrity:graded" or . == "integrity:cleared")) | length > 0' >/dev/null 2>&1; then
            echo "Positive integrity stamp present."
            echo "PASS"
            exit 0
          fi

          # Also accept a posted success status from the town-side guard (future path).
          status_state="$(gh api "repos/$repo/commits/$sha/status" \
            --jq '[.statuses[] | select(.context == "integrity/grade")][0].state // "absent"' 2>/dev/null || echo absent)"
          if [[ "$status_state" == "success" ]]; then
            echo "integrity/grade status is success."
            echo "PASS"
            exit 0
          fi

          # FAIL CLOSED. No stamp means ungraded, not clean.
          echo "::error::No positive integrity stamp on from-specs PR #$pr."
          echo "The polecat transcript has not been graded by the town-side guard."
          echo "Merging is blocked until the guard applies 'integrity:graded' or an operator applies 'integrity:cleared'."
          echo "FAIL"
          exit 1

[package]
name = "pattern-database"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "On-disk pattern database format, loader, writer, and star KD-tree."

[dependencies]
math-core = { path = "../math-core", version = "0.1.0" }
nalgebra = "0.35.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
memmap2 = "0.9"
byteorder = "1.5"
thiserror = "1.0"
half = "2.7.1"

[dev-dependencies]
tempfile = "3.10"

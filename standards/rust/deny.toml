# cargo-deny policy for the Tier-2 regime.
#
# Unlike the v1 stub (which deferred license policy), this curates a permissive
# license allow-list up front — a denied or unknown license is a hard failure, so
# a copyleft/unknown dependency cannot sneak in unnoticed.

[graph]
# Evaluate the platforms the standards target (Linux CI + Apple mobile builds).
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
]
all-features = true

[advisories]
# A yanked crate in the lockfile is a hard failure — replace it.
yanked = "deny"
# RUSTSEC IDs consciously accepted go here, each with a justification comment.
ignore = []

[licenses]
# Permissive licenses only. Anything outside this set fails the gate and must be
# reviewed and added deliberately (or the dependency dropped).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# Duplicate versions are a warning (transitive graphs drift); wildcards are banned
# because `foo = "*"` defeats the locked, reproducible-build guarantee.
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Only crates.io and in-repo path deps. An unknown registry or git remote is a
# supply-chain red flag.
unknown-registry = "deny"
unknown-git = "deny"
